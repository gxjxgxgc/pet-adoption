# 应用配置
# ==================== 服务器配置 ====================
server:
  port: 8082
  servlet:
      context-path: /api
  web:
    resources:
      static-locations: file:C:/Users/user/Desktop/IDEA/pet-adoption/uploads/

# Spring 配置
# ==================== Spring 基础配置 ====================
spring:
  application:
    name: pet-adoption-backend
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/pet_adoption_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: mysql135761  # 请更改为您的数据库密码
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5
      connection-test-query: SELECT 1

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 2MB

# 文件上传路径配置
upload:
  path: C:/Users/user/Desktop/IDEA/pet-adoption/uploads

  devtools:
    enabled: true
    restart:
      enabled: true
      poll-interval: 1000
      quiet-period: 400
    livereload:
      enabled: true
    remote:
      secret: pet-dev-restart-2024

# JWT 配置（用于用户认证）
# ==================== JWT 配置 ====================
jwt:
  secret: pet-adoption-secret-key-2024-very-long-secret-key-for-jwt-token-generation
  expiration: 86400000  # 24小时（毫秒）
  header: Authorization
  prefix: Bearer

# MyBatis-Plus 配置（数据库操作框架）
# ==================== MyBatis-Plus 配置 ====================
mybatis-plus:
  # Mapper 扫描路径
  mapper-locations: classpath*:mapper/**/*.xml
  # 实体类扫描路径
  type-aliases-package: com.petadoption.petadoption.entity
  # 全局配置
  global-config:
    # 主键类型：0 自动增长，1  UUID，2 雪花算法
    id-type: auto
    # 逻辑删除配置
    db-config:
      # 逻辑删除配置（如果需要使用）
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    # 自动创建表结构
    enable-auto-insert-common-fields: true

  # MyBatis 原生配置
  configuration:
    # 开启驼峰命名转换
    map-underscore-to-camel-case: true
    # 开启 SQL 日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.petadoption.petadoption.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn

# 日志配置
logging:
  level:
    com.petadoption: DEBUG
    org.springframework.web: INFO
    com.petadoption.petadoption.mapper: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'
